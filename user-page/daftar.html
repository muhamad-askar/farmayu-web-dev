<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="daftar.css">
  <title>Document</title>
</head>
<body>
  
<div class="kiri">
  <div> <img src="../asset_foto/ikon/farmayu.png" class="logo"> </div>
  <div><a href="login.html" class="kembali">Kembali</a></div>
</div>

<div class="kanan">
  
  <form>
    <h2>Daftar</h2>
    <input type="text" placeholder="Username" required>
    <input type="password" placeholder="Password" required>
    <button type="submit" class="tombol-login">Daftar</button>
  </form>
</div>
<script>

  const formDaftar = document.getElementById("form-daftar");

  formDaftar.addEventListener("submit", function(e) {

      e.preventDefault();

      const inputs = formDaftar.querySelectorAll("input");

      const username = inputs[0].value;

      const password = inputs[1].value;


      localStorage.setItem("akunInTani", JSON.stringify({ username: username, password: password }));

      window.location.href = "login.html";

  });</script>
</body>
</html>
